---
- name: Deploy to Tomcat
  hosts: web
  

  tasks:

    - name: Copy WAR file to Tomcat
      copy:
        src: "/home/deeksha/NewProjects/MavenAnsibleWebApp1/target/MavenAnsibleWebApp1.war"
        dest: "/opt/tomcat/webapps/MavenAnsibleWebApp1.war"
        remote_src: no

    - name: Stop Tomcat
      shell: /opt/tomcat/bin/shutdown.sh
      ignore_errors: yes

    - name: Start Tomcat
      shell: /opt/tomcat/bin/startup.sh
